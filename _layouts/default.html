<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}Blog | Agentic AI User Group</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    
    <!-- Custom Styles -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0a0c;
        color: #e5e7eb;
      }
      .mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .gradient-text {
        background: linear-gradient(90deg, #3b82f6, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero-glow {
        position: absolute;
        top: -10%;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 400px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(10, 10, 12, 0) 70%);
        z-index: -1;
      }
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      }
      .modal-overlay {
        background-color: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
      }
    </style>
    
    {% feed_meta %}
    {% seo %}
  </head>
  <body class="antialiased bg-[#0a0a0c] text-gray-300">
    {% include header.html %}
    
    <main class="site-content">
      {{ content }}
    </main>
    
    {% include footer.html %}
    
    <!-- Join Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
      <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 max-w-[40rem] w-full mx-4 relative">
        <button
          id="closeModal"
          class="absolute top-4 right-4 text-gray-400 hover:text-white transition"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
        <h2 class="text-2xl font-bold mb-3">Join Agentic AI User Group</h2>
        <p class="text-gray-400 mb-6">
          Get the latest articles, tutorials, and updates delivered to your inbox.
        </p>
        <div class="flex justify-center">
          <script
            async
            data-uid="e394d33f99"
            src="https://aaiug.kit.com/e394d33f99/index.js"
          ></script>
        </div>
      </div>
    </div>
    
    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center modal-overlay">
      <div class="bg-gray-900 border border-gray-700 rounded-2xl p-8 max-w-md w-full mx-4 relative text-center">
        <button
          id="closeSuccessModal"
          class="absolute top-4 right-4 text-gray-400 hover:text-white transition"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
        
        <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        
        <h2 class="text-2xl font-bold mb-2 text-white">You're In!</h2>
        <p class="text-gray-400 mb-6">Thanks for joining. Check your inbox for a confirmation email.</p>
        
        <button id="successCloseBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition">
          Got it
        </button>
      </div>
    </div>
    
    <script src="{{ site.baseurl }}/assets/js/main.js"></script>
  </body>
</html>
