<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}Blog | Agentic AI User Group</title>
    <meta name="description" content="{{ page.description | default: site.description }}" />
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    
    <!-- Custom Styles -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0a0a0c;
        color: #e5e7eb;
      }
      .mono {
        font-family: 'JetBrains Mono', monospace;
      }
      .gradient-text {
        background: linear-gradient(90deg, #3b82f6, #2dd4bf);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .hero-glow {
        position: absolute;
        top: -10%;
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        height: 400px;
        background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(10, 10, 12, 0) 70%);
        z-index: -1;
      }
      .card-hover {
        transition: all 0.3s ease;
      }
      .card-hover:hover {
        border-color: rgba(59, 130, 246, 0.3);
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.1);
      }
    </style>
    
    {% feed_meta %}
    {% seo %}
  </head>
  <body class="antialiased bg-[#0a0a0c] text-gray-300">
    {% include header.html %}
    
    <main class="site-content">
      {{ content }}
    </main>
    
    {% include footer.html %}
  </body>
</html>
