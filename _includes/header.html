<header class="fixed top-0 left-0 right-0 z-40 bg-[#0a0a0c]/95 backdrop-blur-sm border-b border-gray-900">
  <div class="flex items-center justify-between px-6 py-4 max-w-7xl mx-auto">
    <div class="flex items-center gap-3">
      <a href="https://www.aaiug.org/">
        <img
          src="{{ site.baseurl }}/images/aaiug-logo.png"
          alt="Agentic AI User Group"
          class="h-16"
        />
      </a>
      <div class="hidden md:flex flex-col">
        <a href="https://www.aaiug.org/" class="text-xl font-bold gradient-text">Agentic AI User Group</a>
      </div>
    </div>
    
    <!-- Desktop Navigation -->
    <div class="hidden md:flex items-center gap-5 text-sm font-medium text-gray-400">
      <a href="https://www.aaiug.org/" class="hover:text-white">Home</a>
      <a href="https://www.aaiug.org/about.html" class="hover:text-white">About</a>
      <a href="https://www.aaiug.org/team.html" class="hover:text-white">Leadership</a>
      <a href="https://www.aaiug.org/blueprints.html" class="hover:text-white">Blueprints</a>
      <a href="https://www.aaiug.org/agents.html" class="hover:text-white">Agents Corner</a>
      <a href="{{ site.baseurl }}/" class="hover:text-white text-white">Blog</a>
    </div>
    
    <!-- Desktop Join Button -->
    <div class="hidden md:block">
      <button
        id="joinBtn"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-xs font-semibold transition cursor-pointer"
      >
        Join
      </button>
    </div>
    
    <!-- Mobile Menu Button -->
    <button id="mobileMenuBtn" class="md:hidden text-gray-400 hover:text-white">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>
  
  <!-- Mobile Menu -->
  <div id="mobileMenu" class="hidden md:hidden bg-[#0a0a0c] border-b border-gray-900">
    <div class="px-6 py-4 flex flex-col gap-4 text-sm font-medium text-gray-400">
      <a href="https://www.aaiug.org/" class="hover:text-white">Home</a>
      <a href="https://www.aaiug.org/about.html" class="hover:text-white">About</a>
      <a href="https://www.aaiug.org/team.html" class="hover:text-white">Leadership</a>
      <a href="https://www.aaiug.org/blueprints.html" class="hover:text-white">Blueprints</a>
      <a href="https://www.aaiug.org/agents.html" class="hover:text-white">Agents Corner</a>
      <a href="{{ site.baseurl }}/" class="hover:text-white text-white">Blog</a>
      <button
        id="joinBtnMobile"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-full text-xs font-semibold transition w-fit"
      >
        Join
      </button>
    </div>
  </div>
</header>
