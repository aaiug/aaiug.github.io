# Site Settings
title: "Blog | Agentic AI User Group"
description: >-
  Insights, tutorials, and articles on Agentic AI, autonomous agents, and AI development.
url: "https://blog.aaiug.org"
baseurl: ""

# Author Information
author:
  name: Agentic AI User Group
  email: hello@aaiug.org
  twitter: aaiug
  github: aaiug

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title.html


# Collections
collections:
  posts:
    output: true

# Default Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - directory-structure.md
  - node_modules/
  - vendor/
